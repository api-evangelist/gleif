              type: string
              nullable: true
            dateCreated:
              type: string
              format: date
            status:
              type: string
              enum: [ACTV, INAC]
            names:
              type: array
              items:
                type: object
    EntityLegalFormListResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/PaginationMeta'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        data:
          type: array
          items:
            $ref: '#/components/schemas/EntityLegalForm'
    RegistrationAuthority:
      type: object
      properties:
        type:
          type: string
          example: registration-authorities
        id:
          type: string
          example: RA000001
        attributes:
          type: object
          properties:
            code:
              type: string
              example: RA000001
            internationalName:
              type: string
            localName:
              type: string
              nullable: true
            internationalOrganizationName:
              type: string
            localOrganizationName:
              type: string
              nullable: true
            website:
              type: string
              format: uri
              nullable: true
            jurisdictions:
              type: array
              items:
                type: object
    RegistrationAuthorityListResponse:
      type: object
      properties:

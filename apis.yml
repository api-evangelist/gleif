apis:
  - aid: https://raw.githubusercontent.com/api-evangelist/gleif/refs/heads/main/apis.yml#gleif-lei-api
    name: GLEIF LEI API
    description: >
      The GLEIF LEI API provides programmatic access to the Global LEI System's
      full data pool, enabling searches by entity name, LEI code, BIC code, ISIN
      code, and corporate relationship structures. The API is free, open, and
      requires no authentication or API key, built on the GLEIF Golden Copy dataset
      which is updated three times daily.
    humanURL: https://www.gleif.org/en/lei-data/gleif-api
    baseURL: https://api.gleif.org/api/v1

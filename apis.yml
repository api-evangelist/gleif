aid: https://raw.githubusercontent.com/api-evangelist/gleif/refs/heads/main/apis.yml
name: GLEIF
description: >
  The Global Legal Entity Identifier Foundation (GLEIF) provides a free, open REST
  API that gives developers access to the full LEI Data search engine functionality.
  The API supports filters, full-text and single-field searches of legal entity and
  ownership data, and fuzzy matching of relevant data fields such as entity names and
  addresses. In addition to LEI reference data, the API exposes reference data for
  LEI issuers, code lists, and mapped identifiers including BIC and ISIN codes. The
  API requires no authentication or registration, making LEI data freely accessible
  to any interested party for searching, validating, and retrieving legal entity
  identifiers and associated organizational reference data.
